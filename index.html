<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaAI - AI工具聚合站</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <div class="logo">NovaAI</div>

        <nav>
            <a href="#">首页</a>
            <a href="#">AI工具</a>
            <a href="#">分类</a>
            <a href="#">会员中心</a>
        </nav>

        <button class="login-btn">登录</button>
    </header>

    <section class="hero">

        <h1>AI工具聚合站</h1>

        <p>发现全球优秀AI工具</p>

        <div class="search-box">
            <input
                type="text"
                id="searchInput"
                placeholder="搜索AI工具..."
            >
        </div>

        <div class="category-bar">
            <button onclick="filterTools('全部')">全部</button>
            <button onclick="filterTools('对话')">AI对话</button>
            <button onclick="filterTools('绘画')">AI绘画</button>
            <button onclick="filterTools('视频')">AI视频</button>
        </div>

    </section>

    <section class="tools" id="toolList">
    </section>

    <script src="app.js"></script>

</body>

</html>
